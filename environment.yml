name: justfitting
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10,<3.13
  # Node.js + JDK for Capacitor Android packaging (see README's "Android
  # app" section) -- conda-installed so the toolchain is fully user-scoped,
  # no admin/Docker required (conda envs live under the user profile).
  - nodejs>=20,<21
  - openjdk=17
  - pip
  - pip:
      - flask>=3.0,<4.0
      - flask-cors>=4.0,<5.0
      - python-dotenv>=1.0,<2.0
      - waitress>=3.0,<4.0
      - black>=24.0
      - isort>=5.13
      - requests>=2.31
      - playwright>=1.44
