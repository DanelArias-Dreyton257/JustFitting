services:
  - type: web
    name: justfitting-api
    runtime: python
    plan: free
    branch: main
    autoDeploy: false # deploys are triggered only via the Deploy Hook, from .github/workflows/release.yml
    buildCommand: pip install -r server/requirements-prod.txt
    startCommand: waitress-serve --host=0.0.0.0 --port=$PORT server.wsgi:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: JUSTFITTING_SEED_DEMO
        value: "true" # auto-seeds the two demo accounts on every boot of an empty DB
