services:
  - type: web
    name: justfitting-api
    env: python
    plan: free
    buildCommand: "pip install -r server/requirements-prod.txt"
    startCommand: "waitress-serve --host=0.0.0.0 --port=$PORT server.wsgi:app"
    envVars:
      - key: JUSTFITTING_DB_PATH
        value: /var/data/justfitting.db
      - key: JUSTFITTING_SEED_DEMO
        value: "false"
      - key: JUSTFITTING_CORS_ORIGINS
        sync: false
    disk:
      name: justfitting-data
      mountPath: /var/data
      sizeGB: 1
