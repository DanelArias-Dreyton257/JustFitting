apply plugin: 'com.android.application'
// Embedded on-device server (Phase 6, planned): bundles a real CPython
// interpreter + these pip packages into the APK. See README's "Android
// app -> Embedded on-device server" section for the full design.
apply plugin: 'com.chaquo.python'
// Phase 7.3 (Health Connect bridge) -- only used to compile
// HealthConnectBridge.kt; see variables.gradle's comment for why this
// one file is Kotlin instead of Java.
apply plugin: 'kotlin-android'

android {
    namespace "com.danelarias.justfitting"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.danelarias.justfitting"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Tracks the repo's own vX.Y.Z release tags (README's Versioning
        // section) -- versionCode must strictly increase per Play Store
        // rules; versionName is what Android's Settings -> App info shows
        // the user. Was never previously kept in sync with the git tags
        // (still 1 / "1.0" through v1.2.0/v1.2.1); Phase 6 is the
        // intended v2.0.0 release, so this bump started that convention.
        // v2.0.0's own CI never actually passed (a real Account-view race,
        // fixed in v2.0.1), so its release never deployed -- v2.0.1 is
        // Phase 6's first release that actually ships. Same story again
        // for Phase 7: v3.0.0's own CI never passed either (a real
        // navigate()/refreshSettings() race this time, the same shape of
        // bug as v2.0.1's own fix) -- v3.0.1 is Phase 7's first release
        // that actually ships.
        versionCode 14
        versionName "6.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }

        // Chaquopy 17 only ships Python 3.12 for 64-bit ABIs (confirmed
        // by a failed build attempt: 32-bit armeabi-v7a/x86 aren't
        // available) -- arm64-v8a covers real devices, x86_64 covers the
        // emulator; every device old enough to be 32-bit-only is already
        // excluded by this module's minSdk 24 bump for Chaquopy anyway.
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    // Explicit, not relying on AGP's own default: MainActivity.java uses
    // lambdas (Phase 6's cold-start splash-screen wiring).
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    // NOT "1.8" to match compileOptions above -- capacitor.build.gradle
    // (applied at the bottom of this file, generated/DO-NOT-EDIT) resets
    // source/targetCompatibility to 17 after this block runs, so 17 is
    // the JVM target compileDebugJavaWithJavac actually ends up using
    // (confirmed by a real "Inconsistent JVM-target" build failure when
    // this was left at 1.8) -- HealthConnectBridge.kt (Phase 7.3) has to
    // match that effective value, not this block's own nominal one.
    kotlinOptions {
        jvmTarget = "17"
    }
}

chaquopy {
    defaultConfig {
        // Pinned to 3.12, not environment.yml's 3.10 floor, because the
        // desktop `justfitting` conda env actually resolved to Python
        // 3.12.13 on this machine -- Chaquopy's build-time interpreter
        // (used to resolve pip packages) must match this major.minor
        // exactly. No `buildPython(...)` override here on purpose: with
        // the `justfitting` conda env active (`conda activate
        // justfitting`), plain `python` on PATH already resolves to the
        // matching 3.12 interpreter, so Chaquopy's own PATH-based search
        // finds it -- avoids hardcoding a machine-specific, username-
        // bearing absolute path into a committed file (same philosophy
        // as this project's JAVA_HOME handling in README's Android SDK
        // section: scoped to the session, not baked in).
        version = "3.12"

        pip {
            // Mirrors server/requirements-prod.txt -- keep both lists in
            // sync by hand; there is no automated sharing between
            // Gradle's pip block and the desktop requirements file.
            install "flask>=3.0,<4.0"
            install "flask-cors>=4.0,<5.0"
            install "python-dotenv>=1.0,<2.0"
            install "waitress>=3.0,<4.0"
        }
    }

    sourceSets {
        getByName("main") {
            // Root is the repo root (not server/ itself), so the `server`
            // directory keeps being importable as `server.src.api.app`
            // etc. -- matching every desktop entry point (Server.py,
            // wsgi.py) and every server/test import -- instead of losing
            // its `server.` prefix. Referenced from its real location,
            // not copied, so the app runs the literal same code
            // server/test already covers (README's "why an embedded
            // Python interpreter, not a JS port" reasoning).
            //
            // No include("server/**") here on purpose: a Gradle
            // SourceDirectorySet's include/exclude patterns apply
            // globally across *every* srcDir registered on it (matched
            // relative to each srcDir's own root), not per srcDir added
            // -- an include("server/**") here previously also filtered
            // out local_server.py from this module's own default
            // src/main/python srcDir (whose relative path is just
            // "local_server.py", not "server/..."), which is why the app
            // crashed on a real device with "ModuleNotFoundError: No
            // module named 'local_server'" despite building successfully
            // (Chaquopy's own build-time checks don't catch a source file
            // silently being filtered out). exclude-only avoids this,
            // since it only ever removes matches and never acts as an
            // allowlist against srcDirs it wasn't written for.
            srcDir("../..")
            exclude(
                "client/**",
                "scripts/**",
                "node_modules/**",
                "docs/**",
                "android/**",
                ".git/**",
                ".github/**",
                ".vscode/**",
                ".claude/**",
                ".pytest_cache/**",
                "dist/**",
                "server/test/**",
                "**/__pycache__/**",
                "**/*_test.py",
                // Repo-root build artifacts that live alongside this
                // sourceSet's root (../..) but are never Python source --
                // gitignored (so `git status` stays clean) but not
                // filesystem-absent, so Chaquopy's own scan still finds
                // them unless explicitly excluded. Their absence was never
                // actually verified before: a stray previously-built
                // JustFitting-debug.apk sitting at the repo root (a
                // completely normal thing to have around between builds)
                // got bundled whole into assets/chaquopy/app.imy, ballooning
                // a real build from ~40MB to ~480MB -- caught by inspecting
                // the built APK's own contents after a suspiciously large
                // build, not by any existing check.
                "*.apk",
                "*.aab",
                "justfitting.db",
                "justfitting.db-journal",
            )
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    // Phase 7.3 (Health Connect bridge, see README): reads Steps/Nutrition
    // records Samsung Health and Mi Fitness already sync into Health
    // Connect on-device -- resolves from google() (root build.gradle), no
    // extra repository needed. Pinned to 1.1.0-alpha08, not the current
    // stable 1.1.0 (requires compileSdk 36 + AGP 8.9.1+) or even
    // 1.1.0-alpha09/10 (compileSdk 35+) -- alpha08 is the newest release
    // that still resolves against this project's compileSdk 34 / AGP
    // 8.2.1, confirmed empirically via `gradlew :app:checkDebugAarMetadata`
    // (every version from alpha09 on fails that check). Bumping
    // compileSdk/AGP that far to reach a newer client is a much bigger,
    // riskier change than this phase's scoped minSdk bump, untested
    // against this project's existing Chaquopy 17 / Capacitor 6 stack --
    // revisit once there's a real reason to move compileSdk forward.
    implementation "androidx.health.connect:connect-client:1.1.0-alpha08"
    // Needed for HealthConnectBridge.kt's runBlocking (see above) --
    // connect-client's own suspend API pulls this in transitively too,
    // but it's declared explicitly since the bridge calls it by name.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
